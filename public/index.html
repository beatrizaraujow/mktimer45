<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKT Hub</title>
  <link rel="icon" type="image/svg+xml" href="/Favicon/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #1a1a1a;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── background blobs ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(245,194,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 80%, rgba(255,255,255,0.03) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 1;
      width: min(400px, 100%);
      background: #222222;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px 32px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.3),
        0 32px 64px -16px rgba(0,0,0,0.6),
        0 8px 24px -8px rgba(0,0,0,0.4);
    }

    /* ── brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 42px;
      height: 42px;
      background: #f5c200;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 22px; height: 22px; }
    .brand-text {}
    .brand-name {
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .brand-sub {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 28px;
    }

    /* ── headline ── */
    .headline {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .subline {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      font-weight: 500;
      margin-bottom: 28px;
    }

    /* ── fields ── */
    .fields { display: flex; flex-direction: column; gap: 12px; }

    .field-wrap { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      color: #ffffff;
      font: 600 14px/1.2 "Inter", sans-serif;
      outline: none;
      transition: border-color .15s, background .15s;
      -webkit-appearance: none;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.2); font-weight: 500; }
    .field-input:focus {
      border-color: #f5c200;
      background: rgba(245,194,0,0.05);
    }

    /* ── error ── */
    .error-msg {
      display: none;
      font-size: 12px;
      font-weight: 600;
      color: #ff6b6b;
      background: rgba(255,107,107,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      text-align: center;
    }

    /* ── button ── */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px 20px;
      background: #f5c200;
      color: #222222;
      border: none;
      border-radius: 10px;
      font: 800 13px/1 "Inter", sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 16px -4px rgba(245,194,0,0.4);
    }
    .btn:hover {
      background: #ffd435;
      box-shadow: 0 6px 20px -4px rgba(245,194,0,0.5);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn svg { width: 14px; height: 14px; }

    /* ── forgot ── */
    .forgot {
      display: block;
      margin-top: 20px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.28);
      font: 600 11px/1 "Inter", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      width: 100%;
      transition: color .15s;
    }
    .forgot:hover { color: #f5c200; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="7" height="7" rx="1.5" fill="#222222"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" fill="#222222"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" fill="#222222"/>
          <circle cx="17.5" cy="17.5" r="3.5" fill="#222222"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">MKT Hub</div>
        <div class="brand-sub">Marketing Operations</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="headline">Bem-vindo de volta</div>
    <div class="subline">Entre com suas credenciais para continuar.</div>

    <form id="loginForm" novalidate>
      <div class="fields">
        <div class="field-wrap">
          <label class="field-label" for="userId">Email</label>
          <input
            class="field-input"
            type="email"
            id="userId"
            name="email"
            autocomplete="email"
            spellcheck="false"
            placeholder="seu@email.com"
          >
        </div>

        <div class="field-wrap">
          <label class="field-label" for="pw">Senha</label>
          <input
            class="field-input"
            type="password"
            id="pw"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
          >
        </div>

        <p class="error-msg" id="errorMsg" role="alert"></p>

        <button type="submit" class="btn" id="submitBtn">
          <span id="submitText">Entrar</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </div>
    </form>

    <button type="button" class="forgot" id="forgotBtn">Esqueci minha senha</button>
  </div>

  <script>
    const errorMsg   = document.getElementById('errorMsg');
    const submitBtn  = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const name     = document.getElementById('userId').value.trim();
      const password = document.getElementById('pw').value;

      if (!name || !password) {
        errorMsg.textContent   = 'Preencha todos os campos.';
        errorMsg.style.display = 'block';
        return;
      }

      submitBtn.disabled     = true;
      submitText.textContent = 'Entrando…';

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, password }),
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('mktimer_token', data.token);
          localStorage.setItem('mktimer_user',  JSON.stringify(data.user));
          window.location.href = '/app';
        } else {
          errorMsg.textContent   = data.error || 'Credenciais inválidas.';
          errorMsg.style.display = 'block';
          submitBtn.disabled     = false;
          submitText.textContent = 'Entrar';
        }
      } catch {
        errorMsg.textContent   = 'Erro de conexão. Tente novamente.';
        errorMsg.style.display = 'block';
        submitBtn.disabled     = false;
        submitText.textContent = 'Entrar';
      }
    });

    document.getElementById('forgotBtn').addEventListener('click', () => {
      alert('Entre em contato com o administrador para redefinir sua senha.');
    });
  </script>
</body>
</html>
