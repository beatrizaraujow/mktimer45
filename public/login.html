<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <h1 class="login-title">Login<span class="login-r">®</span></h1>
      <form class="login-form">
        <label for="username" class="login-label">NOME</label>
        <input id="username" class="login-input" type="text" placeholder="seu nome" autocomplete="username">
        <label for="password" class="login-label">SENHA</label>
        <input id="password" class="login-input" type="password" placeholder="SENHA" autocomplete="current-password">
        <button type="submit" class="login-btn">ENTRAR <span class="login-dot"></span></button>
      </form>
      <a href="#" class="login-link">ALTERAR SENHA</a>
    </div>
  </div>
</body>
</html>
