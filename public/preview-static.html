<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Preview · MKTimer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#c8d0e7;font-family:'Inter',system-ui,sans-serif}
.nav{display:flex;align-items:center;gap:8px;padding:14px 24px;background:#13151f;border-bottom:1px solid #1e2135}
.nav-logo{font-weight:700;font-size:15px;color:#e8b844;margin-right:12px}
.nav a{font-size:13px;color:#7882a4;padding:6px 12px;border-radius:6px}
.nav a.active{background:#1e2135;color:#c8d0e7}
.nav-right{margin-left:auto;font-size:12px;color:#5a6280}
.topbar{display:flex;align-items:center;gap:16px;padding:16px 24px}
.topbar h1{font-size:16px;font-weight:600}
.date-nav{margin-left:auto;display:flex;align-items:center;gap:8px}
.date-btn{background:#1c1e32;border:1px solid #222540;color:#c8d0e7;padding:5px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.date-lbl{font-size:13px;color:#9aa3c4;min-width:120px;text-align:center}
.refresh{font-size:11px;color:#4a5270;margin-left:4px}
.refresh span{color:#e8b844}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:0 24px 24px}
.card{background:#161825;border:1px solid #1e2135;border-radius:12px;padding:18px}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-name{font-size:16px;font-weight:700;color:#e8eaf6;text-transform:capitalize}
.card-cargo{font-size:11px;color:#5a6280;margin-top:2px}
.dot{width:9px;height:9px;border-radius:50%;background:#3dba6f;flex-shrink:0;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#1c1e32;border-radius:8px;padding:10px 8px;text-align:center}
.stat-v{font-size:17px;font-weight:700;color:#e8b844;line-height:1.1}
.stat-l{font-size:10px;color:#5a6280;margin-top:3px}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.meta-l{font-size:11px;color:#5a6280}
.meta-p{font-size:11px;color:#9aa3c4}
.bar{width:100%;height:5px;background:#1e2135;border-radius:3px;overflow:hidden;margin-bottom:10px}
.bar-fill{height:100%;border-radius:3px;background:#e8b844}
.bar-fill.over{background:#3dba6f}
.hrow{font-size:11px;color:#5a6280;margin-bottom:12px;display:flex;gap:12px}
.hrow span{color:#8892b4}
.coef{color:#e8b844;font-weight:600}
.tasks{display:flex;flex-direction:column;gap:5px}
.ti{display:flex;align-items:flex-start;gap:8px;font-size:11.5px}
.chk{width:13px;height:13px;border:1.5px solid #3a3e5a;border-radius:2px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px}
.chk.done{background:#3dba6f;border-color:#3dba6f;color:#fff}
.ttl{flex:1;color:#9aa3c4}
.done .ttl{color:#5a6280;text-decoration:line-through}
.tpt{font-size:11px;font-weight:600;color:#e8b844}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-logo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> MKTimer</span>

<div class="grid" id="grid"></div>

</script>
</body>
</html>
